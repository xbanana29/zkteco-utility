name: Test, Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ══════════════════════════════════════════════════════════════════════════
  # JOB 1: Unit Tests (runs on all push/PR, blocks build if fails)
  # ══════════════════════════════════════════════════════════════════════════
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: pip install pyzk openpyxl pytest pytest-cov

      - name: Install tkinter (mocked but import checked)
        run: sudo apt-get update && sudo apt-get install -y python3-tk

      - name: Run unit tests
        run: |
          pytest test_zkteco_app.py -v --tb=short \
            --cov=zkteco_app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 2-4: Build (only on tag push, only if tests pass)
  # ══════════════════════════════════════════════════════════════════════════
  build-windows:
    name: Build Windows EXE
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyzk openpyxl pyinstaller pillow

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed `
            --name "ZKTeco_Utility" `
            --icon "app_icon.ico" `
            --add-data "app_icon.ico;." `
            --add-data "app_icon.png;." `
            --add-data "i18n.py;." `
            --add-data "updater.py;." `
            --collect-all openpyxl `
            --collect-all zk `
            --hidden-import openpyxl `
            --hidden-import openpyxl.styles `
            --hidden-import openpyxl.styles.fills `
            --hidden-import openpyxl.styles.fonts `
            --hidden-import openpyxl.styles.borders `
            --hidden-import openpyxl.styles.alignment `
            --hidden-import openpyxl.utils `
            --hidden-import openpyxl.worksheet `
            --hidden-import openpyxl.formatting `
            --hidden-import zk `
            --hidden-import zk.base `
            --hidden-import zk.exception `
            --hidden-import zk.user `
            --hidden-import zk.attendance `
            --exclude-module pandas `
            --exclude-module numpy `
            --exclude-module scipy `
            --exclude-module matplotlib `
            --exclude-module PIL `
            --exclude-module sklearn `
            --exclude-module IPython `
            --exclude-module pytest `
            --exclude-module unittest `
            --exclude-module turtle `
            zkteco_app.py

      - uses: actions/upload-artifact@v4
        with:
          name: ZKTeco_Utility_Windows
          path: dist/ZKTeco_Utility.exe

  build-linux:
    name: Build Linux Binary
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y python3-tk

      - name: Install Python deps
        run: pip install pyzk openpyxl pyinstaller

      - name: Build binary
        run: |
          pyinstaller --onefile --windowed \
            --name "ZKTeco_Utility_Linux" \
            --add-data "app_icon.png:." \
            --add-data "i18n.py:." \
            --add-data "updater.py:." \
            --collect-all openpyxl \
            --collect-all zk \
            --hidden-import openpyxl \
            --hidden-import openpyxl.styles \
            --hidden-import openpyxl.utils \
            --hidden-import openpyxl.worksheet \
            --hidden-import openpyxl.formatting \
            --hidden-import zk \
            --exclude-module pandas \
            --exclude-module numpy \
            --exclude-module matplotlib \
            --exclude-module PIL \
            --exclude-module pytest \
            --exclude-module unittest \
            zkteco_app.py

      - uses: actions/upload-artifact@v4
        with:
          name: ZKTeco_Utility_Linux
          path: dist/ZKTeco_Utility_Linux

  build-macos:
    name: Build macOS Binary
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install pyzk openpyxl pyinstaller

      - name: Build binary
        run: |
          pyinstaller --onefile --windowed \
            --name "ZKTeco_Utility_macOS" \
            --add-data "app_icon.png:." \
            --add-data "i18n.py:." \
            --add-data "updater.py:." \
            --collect-all openpyxl \
            --collect-all zk \
            --hidden-import openpyxl \
            --hidden-import openpyxl.styles \
            --hidden-import openpyxl.utils \
            --hidden-import openpyxl.worksheet \
            --hidden-import openpyxl.formatting \
            --hidden-import zk \
            --exclude-module pandas \
            --exclude-module numpy \
            --exclude-module matplotlib \
            --exclude-module PIL \
            --exclude-module pytest \
            --exclude-module unittest \
            zkteco_app.py

      - uses: actions/upload-artifact@v4
        with:
          name: ZKTeco_Utility_macOS
          path: dist/ZKTeco_Utility_macOS

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 5: Create GitHub Release
  # ══════════════════════════════════════════════════════════════════════════
  release:
    name: Create GitHub Release
    needs: [build-windows, build-linux, build-macos]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          name: "ZKTeco Utility ${{ github.ref_name }}"
          body: |
            ## ZKTeco eFace10 Utility ${{ github.ref_name }}

            ### Download
            | Platform | File |
            |----------|------|
            | Windows  | `ZKTeco_Utility.exe` |
            | Linux    | `ZKTeco_Utility_Linux` |
            | macOS    | `ZKTeco_Utility_macOS` |

            ### Install
            **Windows:** Download EXE, place in a dedicated folder, run.
            **Linux:** `chmod +x ZKTeco_Utility_Linux && ./ZKTeco_Utility_Linux`
            **macOS:** `chmod +x ZKTeco_Utility_macOS && ./ZKTeco_Utility_macOS`

            ### From source
            ```bash
            pip install pyzk openpyxl
            python zkteco_app.py
            ```
          files: |
            artifacts/ZKTeco_Utility_Windows/ZKTeco_Utility.exe
            artifacts/ZKTeco_Utility_Linux/ZKTeco_Utility_Linux
            artifacts/ZKTeco_Utility_macOS/ZKTeco_Utility_macOS
          draft: false
          prerelease: false
